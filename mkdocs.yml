site_name: Modern AI Engineer Roadmap
site_url: https://aiZKP.github.io/modern-ai-engineer-roadmap/
site_description: A beginner-to-master roadmap for modern AI engineering, covering AI fundamentals, LLMs, agents, model infrastructure, optimization, hardware acceleration, AI security, blockchain, and ZKML.
site_author: aiZKP
repo_url: https://github.com/marko898911/modern-ai-engineer-roadmap
repo_name: marko898911/modern-ai-engineer-roadmap
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  logo: assets/images/avatar.png
  favicon: assets/images/avatar.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font: false
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search

extra_css:
  - assets/css/custom.css

extra_javascript:
  - assets/js/agent-modals.js

